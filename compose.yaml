services:
  qdrant:
    image: qdrant/qdrant:v1.18.2-unprivileged
    restart: unless-stopped
    init: true
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - portfolio-vector-data:/qdrant/storage

  portfolio:
    build:
      context: .
      target: runtime
    image: ghcr.io/dinesjo/react-portfolio:latest
    container_name: react-portfolio
    restart: unless-stopped
    init: true
    depends_on:
      - qdrant
    environment:
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:?Set OLLAMA_API_KEY in the server environment}
      OLLAMA_EMBEDDING_URL: ${OLLAMA_EMBEDDING_DOCKER_URL:-http://host.docker.internal:11434}
      QDRANT_URL: http://qdrant:6333
      NODE_ENV: production
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8080:8080"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:8080/api/health').then((response)=>{if(!response.ok)process.exit(1)}).catch(()=>process.exit(1))
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  portfolio-vector-data:
